<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>萬芳媒創通 WF MediaFlow</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="shell">
      <header>
        <div class="brand"><b>M</b> 萬芳媒創通 WF MediaFlow</div>
        <p class="eyebrow">多媒體製作申請與進度管理平台</p>
        <h1>萬芳媒創通<br />WF MediaFlow</h1>
        <p>請完整填寫需求；送出後，我們將以 Email 或手機與您確認製作細節。</p>
      </header>

      <form id="form">
        <section>
          <h2><span>01</span>申請人資料</h2>
          <p>我們會透過以下方式與您聯繫。</p>
          <div class="grid">
            <label>單位<input required placeholder="例如：教務處／護理學系" /></label>
            <label>姓名<input required placeholder="請輸入姓名" /></label>
            <label>職稱<input required placeholder="例如：教師、行政人員" /></label>
            <label>手機<input required type="tel" placeholder="0912-345-678" /></label>
            <label class="wide">Email<input required type="email" placeholder="name@example.edu.tw" /></label>
          </div>
        </section>

        <section>
          <h2><span>02</span>製作需求</h2>
          <p>可複選；依所選服務補充必要規格。</p>
          <label>製作物名稱<input required placeholder="例如：114 學年度招生海報" /></label>
          <div class="services">
            <label><input type="checkbox" value="平面設計" />平面設計</label>
            <label><input type="checkbox" value="照片修圖" />照片修圖</label>
            <label><input type="checkbox" value="圖文排版" />圖文排版</label>
            <label><input type="checkbox" value="圖文掃描" />圖文掃描</label>
            <label><input type="checkbox" value="護貝" />護貝</label>
            <label><input type="checkbox" value="光碟燒錄" />光碟燒錄</label>
          </div>
          <small id="warning" hidden>請至少選擇一項製作服務。</small>
        </section>

        <section id="specs" hidden>
          <h2><span>03</span>輸出規格</h2>
          <p>請依需要選擇尺寸及填寫數量。</p>
          <div class="spec-grid">
            <fieldset>
              <legend>一般列印</legend>
              <label><input type="checkbox" />A5</label>
              <label><input type="checkbox" />A4</label>
              <label><input type="checkbox" />A3</label>
              <label>張數<input type="number" min="1" /></label>
            </fieldset>
            <fieldset>
              <legend>大片輸出</legend>
              <label><input type="checkbox" />A2（42×59.4 cm）</label>
              <label><input type="checkbox" />A1（59.4×84 cm）</label>
              <label><input type="checkbox" />A0（84×118 cm）</label>
              <label>張數<input type="number" min="1" /></label>
            </fieldset>
            <fieldset>
              <legend>照片輸出</legend>
              <label><input type="checkbox" />3×5</label>
              <label><input type="checkbox" />4×6</label>
              <label><input type="checkbox" />A4</label>
              <label>張數<input type="number" min="1" /></label>
            </fieldset>
          </div>
        </section>

        <section>
          <h2><span id="step">03</span>補充說明</h2>
          <p>請註明預計使用日期、交期或其他製作需求。</p>
          <label>
            需求說明
            <textarea rows="5" placeholder="例如：預計於 9/1 使用，請於 8/25 前完成；需提供可編輯原始檔。"></textarea>
          </label>
          <label class="upload">
            附件選擇 <em>（純前端版本不會上傳或儲存檔案）</em>
            <input type="file" multiple />
          </label>
        </section>

        <footer>
          <p>這是純前端展示版。送出後不會儲存資料或寄出 Email。</p>
          <button>送出製作申請 →</button>
        </footer>
      </form>

      <section id="done" hidden>
        <b>✓</b>
        <p class="eyebrow">申請已建立</p>
        <h1>已完成送出示範</h1>
        <p>此純前端版本目前不會儲存資料。</p>
        <button id="again">建立另一筆申請</button>
      </section>
    </main>
    <script src="app.js"></script>
  </body>
</html>
